name: CI

on: 
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SCM
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true                                                 # docker build -t khbekzod/flask-app:1.0.0          
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/flask-app:1.0.0    # docker push khbekzod/flask-app:1.0.00

